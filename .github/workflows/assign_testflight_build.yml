name: Assign Latest TestFlight Build

on:
  workflow_dispatch:

jobs:
  assign:
    runs-on: macos-latest
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      BUNDLE_IDENTIFIER: com.tokyonasu.aihostcall
      GROUP_NAME: Internal Testers

    steps:
      - uses: actions/checkout@v4

      - name: Assign latest valid build to a beta group
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          test -n "$ASC_API_KEY_CONTENT" || (echo "Missing ASC_API_KEY_CONTENT" && exit 1)
          test -n "$ASC_KEY_ID" || (echo "Missing ASC_KEY_ID" && exit 1)
          test -n "$ASC_ISSUER_ID" || (echo "Missing ASC_ISSUER_ID" && exit 1)

          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install PyJWT cryptography requests
          python - <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.parse

          import jwt
          import requests

          def request(session, method, url, **kwargs):
              response = session.request(method, url, timeout=30, **kwargs)
              print(method, url, response.status_code)
              if response.status_code >= 400:
                  print(response.text)
                  response.raise_for_status()
              return response

          token = jwt.encode(
              {
                  "iss": os.environ["ASC_ISSUER_ID"],
                  "iat": int(time.time()),
                  "exp": int(time.time()) + 20 * 60,
                  "aud": "appstoreconnect-v1",
              },
              base64.b64decode(os.environ["ASC_API_KEY_CONTENT"]).decode("utf-8"),
              algorithm="ES256",
              headers={"kid": os.environ["ASC_KEY_ID"], "typ": "JWT"},
          )

          session = requests.Session()
          session.headers.update({
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          })
          base = "https://api.appstoreconnect.apple.com/v1"

          app_query = urllib.parse.urlencode({"filter[bundleId]": os.environ["BUNDLE_IDENTIFIER"]})
          apps = request(session, "GET", f"{base}/apps?{app_query}").json().get("data", [])
          if not apps:
              raise SystemExit("No App Store Connect app found")
          app = apps[0]
          app_id = app["id"]
          print("App:", app_id, app["attributes"].get("name"))

          build_query = urllib.parse.urlencode({
              "filter[app]": app_id,
              "filter[processingState]": "VALID",
              "sort": "-uploadedDate",
              "limit": "1",
          })
          builds = request(session, "GET", f"{base}/builds?{build_query}").json().get("data", [])
          if not builds:
              raise SystemExit("No valid builds found")
          build = builds[0]
          build_id = build["id"]
          print("Build:", build_id, build["attributes"].get("version"), build["attributes"].get("uploadedDate"))

          groups_query = urllib.parse.urlencode({
              "filter[app]": app_id,
              "sort": "name",
              "limit": "200",
          })
          groups = request(session, "GET", f"{base}/betaGroups?{groups_query}").json().get("data", [])
          for group in groups:
              attrs = group.get("attributes", {})
              print(
                  "Group:",
                  group["id"],
                  attrs.get("name"),
                  "internal=", attrs.get("isInternalGroup"),
                  "allBuilds=", attrs.get("hasAccessToAllBuilds"),
              )

          group = None
          internal_groups = [g for g in groups if g.get("attributes", {}).get("isInternalGroup")]
          if internal_groups:
              group = internal_groups[0]
          elif groups:
              group = groups[0]
          else:
              create_body = {
                  "data": {
                      "type": "betaGroups",
                      "attributes": {
                          "name": os.environ["GROUP_NAME"],
                          "feedbackEnabled": True,
                          "publicLinkEnabled": False,
                      },
                      "relationships": {
                          "app": {
                              "data": {
                                  "type": "apps",
                                  "id": app_id,
                              }
                          }
                      },
                  }
              }
              group = request(session, "POST", f"{base}/betaGroups", data=json.dumps(create_body)).json()["data"]
              print("Created group:", group["id"], group["attributes"].get("name"))

          group_id = group["id"]
          assign_body = {
              "data": [
                  {
                      "type": "betaGroups",
                      "id": group_id,
                  }
              ]
          }
          assign = session.post(
              f"{base}/builds/{build_id}/relationships/betaGroups",
              data=json.dumps(assign_body),
              timeout=30,
          )
          print("Assign build to group:", assign.status_code)
          if assign.status_code not in (204, 409):
              print(assign.text)
              assign.raise_for_status()
          if assign.status_code == 409:
              print(assign.text)
              print("The build may already be assigned, or Apple needs another TestFlight setup step.")
          else:
              print("Assigned build", build_id, "to beta group", group_id)
          PY
