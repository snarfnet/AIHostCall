name: Refresh TestFlight Tester

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: macos-latest
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      BUNDLE_IDENTIFIER: com.tokyonasu.aihostcall
      TESTER_EMAIL: tokyonasu@yahoo.co.jp

    steps:
      - uses: actions/checkout@v4

      - name: Refresh tester group assignment
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install PyJWT cryptography requests
          python - <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.parse

          import jwt
          import requests

          def fail_if_bad(response):
              if response.status_code >= 400 and response.status_code != 404:
                  print(response.text)
                  response.raise_for_status()

          token = jwt.encode(
              {
                  "iss": os.environ["ASC_ISSUER_ID"],
                  "iat": int(time.time()),
                  "exp": int(time.time()) + 20 * 60,
                  "aud": "appstoreconnect-v1",
              },
              base64.b64decode(os.environ["ASC_API_KEY_CONTENT"]).decode("utf-8"),
              algorithm="ES256",
              headers={"kid": os.environ["ASC_KEY_ID"], "typ": "JWT"},
          )

          session = requests.Session()
          session.headers.update({
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          })
          base = "https://api.appstoreconnect.apple.com/v1"

          app_query = urllib.parse.urlencode({"filter[bundleId]": os.environ["BUNDLE_IDENTIFIER"]})
          app_response = session.get(f"{base}/apps?{app_query}", timeout=30)
          fail_if_bad(app_response)
          app = app_response.json()["data"][0]
          app_id = app["id"]
          print("App:", app_id, app["attributes"].get("name"))

          groups_query = urllib.parse.urlencode({"filter[app]": app_id, "limit": "200"})
          groups_response = session.get(f"{base}/betaGroups?{groups_query}", timeout=30)
          fail_if_bad(groups_response)
          groups = groups_response.json().get("data", [])
          group = next((g for g in groups if g.get("attributes", {}).get("isInternalGroup")), None)
          if not group:
              raise SystemExit("No internal beta group found")
          group_id = group["id"]
          print("Group:", group_id, group["attributes"].get("name"))

          group_testers_response = session.get(f"{base}/betaGroups/{group_id}/betaTesters?limit=200", timeout=30)
          fail_if_bad(group_testers_response)
          testers = group_testers_response.json().get("data", [])
          tester = next((t for t in testers if t.get("attributes", {}).get("email") == os.environ["TESTER_EMAIL"]), None)
          if not tester:
              raise SystemExit("No beta tester found in group for email")
          tester_id = tester["id"]
          print("Tester:", tester_id, tester["attributes"].get("email"))

          build_query = urllib.parse.urlencode({
              "filter[app]": app_id,
              "filter[processingState]": "VALID",
              "sort": "-uploadedDate",
              "limit": "1",
          })
          builds_response = session.get(f"{base}/builds?{build_query}", timeout=30)
          fail_if_bad(builds_response)
          builds = builds_response.json().get("data", [])
          if not builds:
              raise SystemExit("No valid build found")
          build = builds[0]
          build_id = build["id"]
          print("Latest build:", build_id, build["attributes"].get("version"), "minOsVersion=", build["attributes"].get("minOsVersion"))

          build_relation_body = {
              "data": [
                  {
                      "type": "builds",
                      "id": build_id,
                  }
              ]
          }

          assign_build_response = session.post(
              f"{base}/betaTesters/{tester_id}/relationships/builds",
              data=json.dumps(build_relation_body),
              timeout=30,
          )
          print("Assign latest build to tester:", assign_build_response.status_code)
          if assign_build_response.status_code not in (204, 409):
              print(assign_build_response.text)
              assign_build_response.raise_for_status()
          if assign_build_response.status_code == 409:
              print(assign_build_response.text)
              print("Build may already be assigned or tester state blocks direct assignment.")

          tester_builds = session.get(f"{base}/betaTesters/{tester_id}/builds?limit=200", timeout=30)
          print("Tester builds after refresh:", tester_builds.status_code)
          fail_if_bad(tester_builds)
          for build in tester_builds.json().get("data", []):
              attrs = build.get("attributes", {})
              print("Build visible:", attrs.get("version"), "minOsVersion=", attrs.get("minOsVersion"))
          PY
