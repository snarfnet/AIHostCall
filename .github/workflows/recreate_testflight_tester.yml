name: Recreate TestFlight Tester

on:
  workflow_dispatch:

jobs:
  recreate:
    runs-on: macos-latest
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      BUNDLE_IDENTIFIER: com.tokyonasu.aihostcall
      TESTER_EMAIL: tokyonasu@yahoo.co.jp
      TESTER_FIRST_NAME: Satoshi
      TESTER_LAST_NAME: Amasaki

    steps:
      - uses: actions/checkout@v4

      - name: Delete and recreate tester
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install PyJWT cryptography requests
          python - <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.parse

          import jwt
          import requests

          def req(session, method, url, ok=(200, 201, 204, 404), **kwargs):
              response = session.request(method, url, timeout=30, **kwargs)
              print(method, url, response.status_code)
              if response.status_code not in ok:
                  print(response.text)
                  response.raise_for_status()
              return response

          token = jwt.encode(
              {
                  "iss": os.environ["ASC_ISSUER_ID"],
                  "iat": int(time.time()),
                  "exp": int(time.time()) + 20 * 60,
                  "aud": "appstoreconnect-v1",
              },
              base64.b64decode(os.environ["ASC_API_KEY_CONTENT"]).decode("utf-8"),
              algorithm="ES256",
              headers={"kid": os.environ["ASC_KEY_ID"], "typ": "JWT"},
          )

          session = requests.Session()
          session.headers.update({
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          })
          base = "https://api.appstoreconnect.apple.com/v1"

          app_query = urllib.parse.urlencode({"filter[bundleId]": os.environ["BUNDLE_IDENTIFIER"]})
          apps = req(session, "GET", f"{base}/apps?{app_query}").json().get("data", [])
          if not apps:
              raise SystemExit("No app found")
          app = apps[0]
          app_id = app["id"]
          print("App:", app_id, app["attributes"].get("name"))

          groups_query = urllib.parse.urlencode({"filter[app]": app_id, "limit": "200"})
          groups = req(session, "GET", f"{base}/betaGroups?{groups_query}").json().get("data", [])
          group = next((g for g in groups if g.get("attributes", {}).get("isInternalGroup")), None) or (groups[0] if groups else None)
          if not group:
              raise SystemExit("No beta group found")
          group_id = group["id"]
          print("Group:", group_id, group["attributes"].get("name"))

          email = os.environ["TESTER_EMAIL"]
          tester_query = urllib.parse.urlencode({"filter[email]": email, "limit": "200"})
          testers = req(session, "GET", f"{base}/betaTesters?{tester_query}").json().get("data", [])
          print("Existing testers with email:", len(testers))
          for tester in testers:
              tester_id = tester["id"]
              print("Deleting tester:", tester_id, tester["attributes"].get("email"))
              req(session, "DELETE", f"{base}/betaTesters/{tester_id}", ok=(204, 404))

          time.sleep(5)

          create_body = {
              "data": {
                  "type": "betaTesters",
                  "attributes": {
                      "email": email,
                      "firstName": os.environ["TESTER_FIRST_NAME"],
                      "lastName": os.environ["TESTER_LAST_NAME"],
                  },
                  "relationships": {
                      "betaGroups": {
                          "data": [
                              {
                                  "type": "betaGroups",
                                  "id": group_id,
                              }
                          ]
                      }
                  },
              }
          }
          create = req(session, "POST", f"{base}/betaTesters", ok=(201,), data=json.dumps(create_body))
          tester = create.json()["data"]
          tester_id = tester["id"]
          print("Created tester:", tester_id, tester["attributes"].get("email"))

          build_query = urllib.parse.urlencode({
              "filter[app]": app_id,
              "filter[processingState]": "VALID",
              "sort": "-uploadedDate",
              "limit": "1",
          })
          builds = req(session, "GET", f"{base}/builds?{build_query}").json().get("data", [])
          if builds:
              build = builds[0]
              build_id = build["id"]
              print("Latest build:", build_id, build["attributes"].get("version"), "minOsVersion=", build["attributes"].get("minOsVersion"))
              build_body = {"data": [{"type": "builds", "id": build_id}]}
              assign = session.post(f"{base}/betaTesters/{tester_id}/relationships/builds", data=json.dumps(build_body), timeout=30)
              print("Assign latest build:", assign.status_code)
              if assign.status_code not in (204, 409):
                  print(assign.text)
                  assign.raise_for_status()
              if assign.status_code == 409:
                  print(assign.text)

          visible = req(session, "GET", f"{base}/betaTesters/{tester_id}/builds?limit=200").json().get("data", [])
          print("Visible builds:", len(visible))
          for build in visible:
              attrs = build.get("attributes", {})
              print("Build visible:", attrs.get("version"), "minOsVersion=", attrs.get("minOsVersion"))
          PY
