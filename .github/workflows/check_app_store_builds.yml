name: Check App Store Builds

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: macos-latest
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      BUNDLE_IDENTIFIER: com.tokyonasu.aihostcall

    steps:
      - uses: actions/checkout@v4

      - name: Check App Store Connect builds
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          test -n "$ASC_API_KEY_CONTENT" || (echo "Missing ASC_API_KEY_CONTENT" && exit 1)
          test -n "$ASC_KEY_ID" || (echo "Missing ASC_KEY_ID" && exit 1)
          test -n "$ASC_ISSUER_ID" || (echo "Missing ASC_ISSUER_ID" && exit 1)

          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install PyJWT cryptography requests
          python - <<'PY'
          import base64
          import os
          import time
          import urllib.parse

          import jwt
          import requests

          token = jwt.encode(
              {
                  "iss": os.environ["ASC_ISSUER_ID"],
                  "iat": int(time.time()),
                  "exp": int(time.time()) + 20 * 60,
                  "aud": "appstoreconnect-v1",
              },
              base64.b64decode(os.environ["ASC_API_KEY_CONTENT"]).decode("utf-8"),
              algorithm="ES256",
              headers={"kid": os.environ["ASC_KEY_ID"], "typ": "JWT"},
          )

          session = requests.Session()
          session.headers.update({"Authorization": f"Bearer {token}"})
          base = "https://api.appstoreconnect.apple.com/v1"

          app_query = urllib.parse.urlencode({"filter[bundleId]": os.environ["BUNDLE_IDENTIFIER"]})
          app_response = session.get(f"{base}/apps?{app_query}", timeout=30)
          print("Apps:", app_response.status_code)
          if app_response.status_code >= 400:
              print(app_response.text)
              app_response.raise_for_status()

          apps = app_response.json().get("data", [])
          if not apps:
              raise SystemExit("No App Store Connect app found for this bundle identifier")

          app = apps[0]
          print("App ID:", app["id"])
          print("App Name:", app["attributes"].get("name"))

          build_query = urllib.parse.urlencode({
              "filter[app]": app["id"],
              "include": "buildBetaDetail,betaGroups",
              "sort": "-uploadedDate",
              "limit": "10",
          })
          build_response = session.get(f"{base}/builds?{build_query}", timeout=30)
          print("Builds:", build_response.status_code)
          if build_response.status_code >= 400:
              print(build_response.text)
              build_response.raise_for_status()

          builds = build_response.json().get("data", [])
          if not builds:
              print("No builds found yet.")
          for build in builds:
              attrs = build.get("attributes", {})
              print(
                  "Build:",
                  "version=", attrs.get("version"),
                  "uploadedDate=", attrs.get("uploadedDate"),
                  "processingState=", attrs.get("processingState"),
                  "expired=", attrs.get("expired"),
                  "usesNonExemptEncryption=", attrs.get("usesNonExemptEncryption"),
              )
              relationships = build.get("relationships", {})
              beta_detail = relationships.get("buildBetaDetail", {}).get("data")
              beta_groups = relationships.get("betaGroups", {}).get("data", [])
              print("  betaDetail=", beta_detail)
              print("  betaGroups=", beta_groups)

          included = build_response.json().get("included", [])
          group_ids = set()
          for item in included:
              print("Included:", item.get("type"), item.get("id"), item.get("attributes", {}))
              if item.get("type") == "betaGroups":
                  group_ids.add(item["id"])

          for group_id in sorted(group_ids):
              testers_response = session.get(f"{base}/betaGroups/{group_id}/betaTesters?limit=200", timeout=30)
              print("Group testers:", group_id, testers_response.status_code)
              if testers_response.status_code >= 400:
                  print(testers_response.text)
                  testers_response.raise_for_status()
              testers = testers_response.json().get("data", [])
              if not testers:
                  print("  No testers in group.")
              for tester in testers:
                  attrs = tester.get("attributes", {})
                  print(
                      "  Tester:",
                      tester.get("id"),
                      "email=", attrs.get("email"),
                      "firstName=", attrs.get("firstName"),
                      "lastName=", attrs.get("lastName"),
                      "inviteType=", attrs.get("inviteType"),
                  )

                  tester_id = tester["id"]
                  tester_groups = session.get(f"{base}/betaTesters/{tester_id}/betaGroups?limit=200", timeout=30)
                  print("  Tester beta groups:", tester_groups.status_code)
                  if tester_groups.status_code < 400:
                      for tester_group in tester_groups.json().get("data", []):
                          print("    group=", tester_group.get("id"), tester_group.get("attributes", {}))
                  else:
                      print(tester_groups.text)

                  tester_builds = session.get(f"{base}/betaTesters/{tester_id}/builds?limit=200", timeout=30)
                  print("  Tester builds:", tester_builds.status_code)
                  if tester_builds.status_code < 400:
                      tester_build_data = tester_builds.json().get("data", [])
                      if not tester_build_data:
                          print("    No builds visible for this tester.")
                      for tester_build in tester_build_data:
                          print("    build=", tester_build.get("id"), tester_build.get("attributes", {}))
                  else:
                      print(tester_builds.text)
          PY
