name: AIHostCall
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.aihostcall
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    exactVersion: 11.13.0

targets:
  AIHostCall:
    type: application
    platform: iOS
    sources: [AIHostCall]
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_NAME: AIHostCall
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: AIHostCall/Info.plist
      properties:
        CFBundleName: "ホスコール"
        CFBundleDisplayName: "ホスコール"
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSMicrophoneUsageDescription: "あなたの声を文字起こしして、AIホストとの会話に使います。"
        NSSpeechRecognitionUsageDescription: "話した内容を端末上で文字に変換するために使います。"
        NSUserTrackingUsageDescription: "広告の表示と効果測定のために使用します。"
        GADApplicationIdentifier: "ca-app-pub-9404799280370656~5347257685"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: 3rd42ekr43.skadnetwork
          - SKAdNetworkIdentifier: 3qcr597p9d.skadnetwork
